<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌾 像素农场 Pixel Farm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
        }
        
        #game-title {
            color: #7ee787;
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0 #2d5a3d;
            letter-spacing: 2px;
        }
        
        #game-container {
            position: relative;
            border: 4px solid #4a5568;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(126, 231, 135, 0.3);
        }
        
        #gameCanvas {
            display: block;
            background: #87ceeb;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            pointer-events: none;
        }
        
        #top-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            color: white;
            font-size: 14px;
            font-weight: bold;
        }
        
        #day-display {
            color: #fbbf24;
        }
        
        #time-display {
            color: #7ee787;
        }
        
        #inventory {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            background: rgba(0,0,0,0.8);
            padding: 8px;
            border-radius: 8px;
            border: 2px solid #4a5568;
        }
        
        .inv-slot {
            width: 50px;
            height: 50px;
            background: #2d3748;
            border: 3px solid #4a5568;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s;
        }
        
        .inv-slot.active {
            border-color: #7ee787;
            box-shadow: 0 0 10px #7ee787;
            transform: scale(1.1);
        }
        
        .inv-slot:hover {
            background: #4a5568;
        }
        
        #controls {
            margin-top: 15px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .control-btn {
            padding: 12px 24px;
            background: #2d5a3d;
            color: #7ee787;
            border: 3px solid #7ee787;
            border-radius: 8px;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .control-btn:hover {
            background: #7ee787;
            color: #1a1a2e;
            transform: translateY(-2px);
        }
        
        .control-btn:active {
            transform: translateY(0);
        }
        
        #mobile-controls {
            display: none;
            margin-top: 15px;
        }
        
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }
        
        .d-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            user-select: none;
        }
        
        .d-btn:active {
            background: rgba(126, 231, 135, 0.5);
        }
        
        .d-btn:nth-child(2) { grid-column: 2; }
        .d-btn:nth-child(4) { grid-column: 1; grid-row: 2; }
        .d-btn:nth-child(5) { grid-column: 2; grid-row: 2; background: rgba(126, 231, 135, 0.3); }
        .d-btn:nth-child(6) { grid-column: 3; grid-row: 2; }
        .d-btn:nth-child(8) { grid-column: 2; grid-row: 3; }
        
        @media (max-width: 600px) {
            #game-title {
                font-size: 18px;
            }
            
            #mobile-controls {
                display: block;
            }
            
            #controls {
                display: none;
            }
            
            .inv-slot {
                width: 45px;
                height: 45px;
                font-size: 24px;
            }
        }
        
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: #7ee787;
            padding: 20px 40px;
            border-radius: 12px;
            border: 3px solid #7ee787;
            font-size: 18px;
            display: none;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <h1 id="game-title">🌾 PIXEL FARM</h1>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="640" height="480"></canvas>
        
        <div id="ui-overlay">
            <div id="top-bar">
                <span id="day-display">📅 Day 1 - Spring</span>
                <span id="time-display">🕐 6:00 AM</span>
                <span id="money-display">💰 $100</span>
            </div>
            
            <div id="inventory">
                <div class="inv-slot active" data-tool="hand" title="Hand">🤚</div>
                <div class="inv-slot" data-tool="hoe" title="Hoe">⛏️</div>
                <div class="inv-slot" data-tool="seed" title="Seeds">🌱</div>
                <div class="inv-slot" data-tool="water" title="Water">💧</div>
                <div class="inv-slot" data-tool="harvest" title="Harvest">🧺</div>
            </div>
        </div>
        
        <div id="message"></div>
    </div>
    
    <div id="controls">
        <button class="control-btn" onclick="game.save()">💾 SAVE</button>
        <button class="control-btn" onclick="game.load()">📂 LOAD</button>
        <button class="control-btn" onclick="game.sleep()">🛏️ SLEEP</button>
        <button class="control-btn" onclick="game.togglePause()">⏸️ PAUSE</button>
    </div>
    
    <div id="mobile-controls">
        <div class="d-pad">
            <div></div>
            <div class="d-btn" ontouchstart="game.movePlayer(0, -1)" onmousedown="game.movePlayer(0, -1)">⬆️</div>
            <div></div>
            <div class="d-btn" ontouchstart="game.movePlayer(-1, 0)" onmousedown="game.movePlayer(-1, 0)">⬅️</div>
            <div class="d-btn" ontouchstart="game.action()" onmousedown="game.action()">🅰️</div>
            <div class="d-btn" ontouchstart="game.movePlayer(1, 0)" onmousedown="game.movePlayer(1, 0)">➡️</div>
            <div></div>
            <div class="d-btn" ontouchstart="game.movePlayer(0, 1)" onmousedown="game.movePlayer(0, 1)">⬇️</div>
            <div></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
